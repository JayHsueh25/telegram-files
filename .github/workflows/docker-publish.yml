name: Build & Push Docker Image to Docker Hub

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.sha }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE_NAME: telegram-files

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish source
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_REF}" in
            refs/heads/main)
              exit 0
              ;;
            refs/tags/v*)
              git fetch origin main --force
              tag_commit="$(git rev-list -n 1 "${GITHUB_REF}")"
              main_commit="$(git rev-parse origin/main)"

              if ! git merge-base --is-ancestor "${tag_commit}" "${main_commit}"; then
                echo "::error title=Tag is not on main::Version tags can only publish when their commit is already contained in origin/main."
                exit 1
              fi
              ;;
            *)
              echo "::error title=Unsupported publish ref::Run this workflow from main or use a version tag that points to a commit already contained in origin/main."
              exit 1
              ;;
          esac

      - name: Resolve Docker Hub image name
        id: dockerhub
        shell: bash
        env:
          INPUT_DOCKERHUB_USERNAME_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          INPUT_DOCKERHUB_USERNAME_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          INPUT_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          INPUT_REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_DOCKERHUB_IMAGE_NAME: ${{ env.DOCKERHUB_IMAGE_NAME }}
        run: |
          set -euo pipefail

          namespace_raw="${INPUT_DOCKERHUB_USERNAME_VAR:-${INPUT_DOCKERHUB_USERNAME_SECRET:-$INPUT_REPOSITORY_OWNER}}"
          namespace_raw="$(echo "$namespace_raw" | tr -d '[:space:]')"
          if [ -z "$namespace_raw" ]; then
            echo "::error title=Missing Docker Hub username::Set repository variable DOCKERHUB_USERNAME."
            exit 1
          fi

          if [ -z "${INPUT_DOCKERHUB_TOKEN:-}" ]; then
            echo "::error title=Missing Docker Hub token::Please set DOCKERHUB_TOKEN secret."
            exit 1
          fi

          namespace="$(echo "$namespace_raw" | tr '[:upper:]' '[:lower:]')"
          repository="$(echo "$INPUT_DOCKERHUB_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"

          echo "namespace=${namespace}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"
          echo "image=${namespace}/${repository}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.namespace }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.image }}
          tags: |
            # Keep latest for main branch and release tags only.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            # Preserve immutable release tags such as v0.1.0.
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
